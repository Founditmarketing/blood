<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Daniel Blood | Author</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@100..900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-serif {
      font-family: 'Crimson Pro', serif;
    }

    html {
      scroll-behavior: smooth;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* Hide images until they are loaded to prevent broken icon flash */
    img:not([src]) {
      visibility: hidden;
    }
  </style>
  <script>
    window.addEventListener('error', function (e) {
      var err = document.createElement('div');
      err.style.cssText = 'position:fixed;top:0;left:0;z-index:999999;background:red;color:white;padding:20px;font-size:16px;overflow:auto;max-height:100vh;max-width:100vw;word-wrap:break-word;';
      err.innerHTML = '<h2>Sync Error</h2>' + e.message + '<br/><pre>' + (e.error ? e.error.stack : '') + '</pre>';
      document.body.appendChild(err);
    });
    window.addEventListener('unhandledrejection', function (e) {
      var err = document.createElement('div');
      err.style.cssText = 'position:fixed;top:50vh;left:0;z-index:999999;background:orange;color:black;padding:20px;font-size:16px;overflow:auto;max-height:50vh;max-width:100vw;word-wrap:break-word;';
      err.innerHTML = '<h2>Promise Error</h2>' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
      document.body.appendChild(err);
    });
  </script>
</head>

<body class="bg-stone-50 text-stone-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
